<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Mohit's Command — Responsive</title>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <style>
        /* --------------------
       Design system (mobile-first)
       -------------------- */
        :root {
            --bg: #030312;
            --panel: rgba(8, 10, 12, 0.85);
            --glass: rgba(255, 255, 255, 0.03);
            --primary: #4f46e5;
            --accent: #ec4899;
            --muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --text: #e6eef8;
            --card-border: rgba(255, 255, 255, 0.04);
            --h1: clamp(18px, 3vw, 28px);
            --h2: clamp(16px, 2.4vw, 22px);
            --body: clamp(14px, 2vw, 16px);
            --radius: 12px;
            --gap: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%
        }

        body {
            background: linear-gradient(180deg, var(--bg) 0%, #05060a 100%);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            font-family: Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 18px;
            line-height: 1.35;
            font-size: var(--body);
        }

        .wrap {
            width: 100%;
            max-width: 1180px;
            margin: 0 auto;
        }

        header.appbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand h1 {
            font-size: var(--h1);
            color: var(--primary);
            letter-spacing: -0.02em
        }

        .brand p {
            font-size: 13px;
            color: var(--muted)
        }

        .panel {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border-radius: var(--radius);
            padding: 14px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.6);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px
        }

        label.small {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            display: block
        }

        input[type=password],
        input[type=number],
        input[type=text],
        .file-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            background: #051027;
            color: var(--text);
            font-size: var(--body);
        }

        input:focus {
            outline: 2px solid rgba(79, 70, 229, 0.18);
            border-color: rgba(79, 70, 229, 0.35)
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background: #334155;
        }

        .btn.primary {
            background: linear-gradient(90deg, var(--primary), #7c3aed);
            box-shadow: 0 6px 0 rgba(31, 41, 255, 0.12)
        }

        .btn.accent {
            background: linear-gradient(90deg, var(--accent), #db2777)
        }

        .btn.danger {
            background: linear-gradient(90deg, var(--danger), #b91c1c)
        }

        .btn:active {
            transform: translateY(3px)
        }

        .row {
            display: flex;
            gap: 8px
        }

        .row .col {
            flex: 1
        }

        #display-area {
            display: none;
            margin-top: 10px;
            text-align: center
        }

        #display-area.active {
            display: block
        }

        #display-area img,
        #display-area video {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid var(--card-border)
        }

        /* Terminal Area Base Styling */
        .terminal-wrapper {
            margin-top: 14px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            background: linear-gradient(180deg, #09090b, #000000);
            display: flex;
            flex-direction: column;
        }

        .term-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(255, 255, 255, 0.02);
        }

        .term-main-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            overflow: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
        }

        .tab {
            padding: 8px 12px;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            flex-shrink: 0;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
            border-color: rgba(255, 255, 255, 0.05)
        }

        #terminals-area {
            background: #000;
            padding: 10px;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .xterm-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        .xterm-container.active {
            display: block;
        }

        /* Virtual Keyboard */
        .virtual-kb {
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
            background: rgba(15, 23, 36, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
        }

        /* ✨ MAYRA'S INVISIBLE SCROLL MAGIC ✨ */
        /* Chrome, Safari, WebKit browsers ke liye */
        *::-webkit-scrollbar {
            display: none;
        }

        /* Firefox, IE, Edge ke liye */
        * {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .virtual-kb1 {
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
            background: rgba(15, 23, 36, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
        }

        .vk-key {
            flex-shrink: 0;
            padding: 10px 14px;
            border-radius: 8px;
            color: white;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 48px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
        }

        .vk-key.toggled {
            background: var(--danger)
        }

        .vk-key:active {
            background: #334155;
            transform: scale(0.95);
        }

        /* -------------------------------------------
           FULLSCREEN & LANDSCAPE MAGIC RESPONSIVENESS
           ------------------------------------------- */

        /* Jab terminal fullscreen mode me ho */
        .terminal-wrapper.fullscreen-active {
            position: fixed !important;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            border-radius: 0;
            background: #000;
        }

        /* Landscape Mode me VK right side par! */
        @media (orientation: landscape) {
            .terminal-wrapper.fullscreen-active {
                flex-direction: row;
                /* Sidha horizontal layout */
            }

            .terminal-wrapper.fullscreen-active .term-main-content {
                flex-grow: 1;
                height: 100vh;
            }

            .terminal-wrapper.fullscreen-active .virtual-kb {
                flex-direction: column;
                /* Buttons vertically aayenge */
                width: 80px;
                height: 100vh;
                overflow-y: auto;
                overflow-x: hidden;
                border-top: none;
                border-left: 1px solid rgba(255, 255, 255, 0.05);
                padding: 10px 5px;
            }

            .terminal-wrapper.fullscreen-active .vk-label {
                display: none;
            }

            .terminal-wrapper.fullscreen-active .vk-key {
                width: 100%;
                padding: 14px 0;
            }
        }

        #login-section {
            max-width: 420px;
            margin: 12vh auto
        }

        @media (min-width:900px) {
            body {
                padding: 28px
            }

            .two-col {
                display: grid;
                grid-template-columns: 420px 1fr;
                gap: 18px;
                align-items: start
            }

            .xterm-container {
                min-height: 480px
            }

            #login-section {
                margin-top: 18vh
            }

            /* ✨ MAYRA'S LAPTOP FIX: Desktop par physical keyboard hai, toh Virtual VK ko hide kar do! */
            .virtual-kb1 {
                display: none !important;
            }

            /* Laptop par fullscreen me bhi extra padding hata do */
            .terminal-wrapper.fullscreen-active .term-main-content {
                padding-right: 0 !important;
            }
        }

        @media (max-width:360px) {
            .brand h1 {
                font-size: 16px
            }

            .row {
                flex-direction: column
            }
        }

        /* ✨ MAYRA'S INVISIBLE SCROLL MAGIC ✨ */
        /* Chrome, Safari, WebKit browsers ke liye */
    </style>
</head>

<body>
    <div class="wrap">

        <header class="appbar">
            <div class="brand">
                <div
                    style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:700;color:white">
                    M</div>
                <div>
                    <h1>Mohit's Command</h1>
                    <p>Responsive remote terminal</p>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
                <button class="btn danger" onclick="logout()">Logout</button>
            </div>
        </header>

        <div id="login-section" class="panel">
            <h2 style="margin-bottom:10px;color:var(--primary)">🔒 Access Terminal</h2>
            <div class="controls">
                <input id="passwordInput" type="password" placeholder="Secret Password..." aria-label="password">
                <button class="btn primary" onclick="login()">Enter System</button>
                <p id="loginError" style="color:var(--danger);text-align:center;font-size:13px"></p>
            </div>
        </div>

        <div id="dashboard" style="display:none">

            <div class="two-col">
                <div class="panel">
                    <h3 style="color:var(--primary);margin-bottom:10px">👀 Vision & Recording</h3>

                    <div class="row" style="margin-bottom:6px">
                        <button class="btn" style="flex:1" onclick="fetchMedia('/api/screenshot','img')">📸
                            Screen</button>
                        <button class="btn" style="flex:1" onclick="fetchMedia('/api/spyphoto','img')">🤫 Spy
                            Cam</button>
                    </div>

                    <div class="row" style="margin-bottom:10px">
                        <div class="col">
                            <label class="small">Screen (sec)</label>
                            <input id="screenTime" type="number" value="10" min="1" max="120">
                        </div>
                        <div class="col">
                            <label class="small">Cam (sec)</label>
                            <input id="camTime" type="number" value="5" min="1" max="30">
                        </div>
                    </div>

                    <div class="row" style="margin-bottom:8px">
                        <button class="btn accent" style="flex:1"
                            onclick="recordMedia('/api/screenrecord','screenTime')">📺 Rec Screen</button>
                        <button class="btn accent" style="flex:1" onclick="recordMedia('/api/spycam','camTime')">🕵️ Rec
                            Cam</button>
                    </div>

                    <hr style="border:none;border-top:1px solid rgba(255,255,255,0.03);margin:12px 0">

                    <h3 style="color:var(--primary);margin-bottom:10px">✨ Magic & Audio</h3>
                    <div class="row" style="margin-bottom:8px">
                        <input id="magicInput" type="text" placeholder="Type magic message...">
                        <button class="btn primary" onclick="castMagic()">🪄</button>
                    </div>

                    <label class="small">Upload audio to play on Xubuntu</label>
                    <input id="audioUpload" class="file-input" type="file" accept="audio/*">
                    <div class="row" style="margin-top:8px">
                        <button class="btn" style="flex:1" onclick="uploadAudio()">🎵 Play</button>
                        <button class="btn danger" style="flex:1" onclick="stopMusic()">🛑 Stop</button>
                    </div>

                    <div id="display-area"></div>
                </div>

                <div class="terminal-wrapper panel" id="terminalWrapper">

                    <div class="term-main-content">
                        <div class="term-top">
                            <div>
                                <strong style="color:var(--muted)">💻 Xubuntu Shell</strong>
                            </div>
                            <div style="display:flex;gap:8px;align-items:center">
                                <button class="btn" onclick="toggleFullScreen()"
                                    style="padding:6px 10px; font-size:12px;">⛶ Fullscreen</button>
                                <button class="btn primary" onclick="createNewTab()"
                                    style="padding:6px 10px; font-size:12px;">➕ New Tab</button>
                            </div>
                        </div>

                        <div class="tab-bar panel" id="tabBar" aria-label="tab bar"
                            style="border-radius:0; border-left:none; border-right:none;">
                        </div>
                        <div class="virtual-kb1" aria-hidden="false">
                            <div class="vk-label" style="font-size:12px;color:var(--muted);min-width:30px">VK:</div>
                            <button class="vk-key" onclick="sendDirectKey('\x1b[D')">←</button>
                            <button class="vk-key" onclick="sendDirectKey('\x1b[B')">↓</button>
                            <button class="vk-key" onclick="sendDirectKey('\x1b[A')">↑</button>
                            <button class="vk-key" onclick="sendDirectKey('\x1b[C')">→</button>
                            <button class="vk-key" onclick="sendDirectKey('\x0d')">Enter</button>
                            <button class="vk-key" id="vk-ctrl" onclick="toggleCtrl()">Ctrl</button>
                            <button class="vk-key" onclick="sendDirectKey('\x03')">Ctrl+C</button>
                            <button class="vk-key" onclick="sendDirectKey('\x1a')">Ctrl+Z</button>
                            <button class="vk-key" onclick="sendDirectKey('\x1b')">Esc</button>
                            <button class="vk-key" onclick="sendDirectKey('\x09')">Tab</button>

                            <button class="vk-key" onclick="forceKillCurrent()"
                                style="background:#450a0a; color:#fca5a5;">Kill 🔪</button>
                        </div>

                        <div id="terminals-area">
                        </div>
                    </div>

                    <div class="virtual-kb" aria-hidden="false">
                        <div class="vk-label" style="font-size:12px;color:var(--muted);min-width:30px">VK:</div>

                        <button class="vk-key" onclick="sendDirectKey('\x1b[D')">←</button>
                        <button class="vk-key" onclick="sendDirectKey('\x1b[B')">↓</button>
                        <button class="vk-key" onclick="sendDirectKey('\x1b[A')">↑</button>
                        <button class="vk-key" onclick="sendDirectKey('\x1b[C')">→</button>
                        <button class="vk-key" onclick="sendDirectKey('\x0d')">Enter</button>

                        <button class="vk-key" id="vk-ctrl" onclick="toggleCtrl()">Ctrl</button>
                        <button class="vk-key" onclick="sendDirectKey('\x03')">Ctrl+C</button>
                        <button class="vk-key" onclick="sendDirectKey('\x1a')">Ctrl+Z</button>
                        <button class="vk-key" onclick="sendDirectKey('\x1b')">Esc</button>
                        <button class="vk-key" onclick="sendDirectKey('\x09')">Tab</button>
                        <button class="vk-key" onclick="forceKillCurrent()"
                            style="background:#450a0a; color:#fca5a5;">Kill 🔪</button>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
        // ------- Logic Area -------
        let socket;
        let terminals = {};
        let activeTabId = null;
        let tabCount = 0;
        let isCtrlToggled = false;

        const BASE_URL = "https://awhirl-digestibly-refugio.ngrok-free.dev";
        let currentToken = localStorage.getItem("magic_token");

        if (currentToken) showDashboard();

        async function login() {
            const pass = document.getElementById('passwordInput').value;
            try {
                const res = await fetch(`${BASE_URL}/api/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify({ password: pass })
                });
                if (res.ok) { currentToken = pass; localStorage.setItem('magic_token', currentToken); showDashboard(); }
                else document.getElementById('loginError').innerText = 'Wrong Password!';
            } catch (e) { document.getElementById('loginError').innerText = 'Server offline!'; }
        }

        function showDashboard() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initTerminal();
        }

        function logout() { localStorage.removeItem('magic_token'); location.reload(); }

        // API Helpers
        async function fetchAPI(endpoint, method = 'GET', body = null) {
            const options = { method, headers: { 'Authorization': currentToken, 'ngrok-skip-browser-warning': 'true' } };
            if (body) { options.headers['Content-Type'] = 'application/json'; options.body = JSON.stringify(body); }
            return fetch(`${BASE_URL}${endpoint}`, options);
        }

        async function fetchMedia(endpoint, type) {
            const area = document.getElementById('display-area'); area.classList.add('active'); area.innerHTML = '<p style="color:var(--muted)">Loading... ⏳</p>';
            const res = await fetchAPI(endpoint);
            if (res.ok) { const url = URL.createObjectURL(await res.blob()); area.innerHTML = `<img src="${url}" />`; }
            else area.innerHTML = '<p style="color:var(--danger)">Failed to load</p>';
        }

        async function recordMedia(endpoint, inputId) {
            const duration = document.getElementById(inputId).value;
            const area = document.getElementById('display-area'); area.classList.add('active'); area.innerHTML = `<p style="color:var(--accent)">Recording for ${duration}s...</p>`;
            const res = await fetchAPI(endpoint, 'POST', { duration });
            if (res.ok) { const url = URL.createObjectURL(await res.blob()); area.innerHTML = `<video src="${url}" controls autoplay playsinline></video>`; }
            else area.innerHTML = '<p style="color:var(--danger)">Recording failed</p>';
        }

        async function castMagic() { const text = document.getElementById('magicInput').value; await fetchAPI('/api/message', 'POST', { text }); document.getElementById('magicInput').value = ''; }
        async function uploadAudio() { const fileInput = document.getElementById('audioUpload'); if (!fileInput.files[0]) return alert('Select audio file'); const formData = new FormData(); formData.append('audioFile', fileInput.files[0]); await fetch(`${BASE_URL}/api/playaudio`, { method: 'POST', headers: { 'Authorization': currentToken, 'ngrok-skip-browser-warning': 'true' }, body: formData }); alert('Music sent!'); }
        async function stopMusic() { await fetchAPI('/api/musicroko', 'POST'); }

        // ------- Terminal WebSockets + FitAddon Logic -------

        function initTerminal() {
            socket = io(BASE_URL, { auth: { token: currentToken }, extraHeaders: { 'ngrok-skip-browser-warning': 'true' } });

            socket.on('connect', () => {
                // Puraane tabs connect hone par success text
                for (let id in terminals) terminals[id].xterm.write('\r\n\x1b[32m[Connected to Xubuntu!]\x1b[0m\r\n');

                // ✨ MAGIC: Sirf tabhi pehla naya tab banao jab connection secure ho jaye!
                if (Object.keys(terminals).length === 0) {
                    createNewTab();
                }
            });

            socket.on('terminal-data', ({ tabId, data }) => {
                if (terminals[tabId]) terminals[tabId].xterm.write(data);
            });

            socket.on('connect_error', () => alert('Terminal Connection Failed!'));

            // Yahan neeche jo direct createNewTab() rakha tha, use hata diya gaya hai!
        }

        function createNewTab() {
            tabCount++; const tabId = `s_${tabCount}`;
            const tabBtn = document.createElement('div'); tabBtn.className = 'tab'; tabBtn.id = `tab-btn-${tabId}`;
            tabBtn.innerHTML = `Bash ${tabCount} <span style="margin-left:8px;cursor:pointer;color:var(--danger)" onclick="closeTab('${tabId}', event)">×</span>`;
            tabBtn.onclick = () => switchTab(tabId);
            document.getElementById('tabBar').appendChild(tabBtn);

            const container = document.createElement('div'); container.className = 'xterm-container'; container.id = `container-${tabId}`;
            document.getElementById('terminals-area').appendChild(container);

            // Initialize Terminal & FitAddon
            const term = new Terminal({ theme: { background: '#000', foreground: '#e6eef8', cursor: '#4f46e5' }, fontSize: 13, fontFamily: "Menlo, Monaco, 'Courier New', monospace" });
            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            terminals[tabId] = { xterm: term, fit: fitAddon, container, btn: tabBtn };

            switchTab(tabId);
            term.open(container);

            // Ab ye terminal ko container ke hisab se perfect width dega
            setTimeout(() => { fitAddon.fit(); }, 50);

            term.write('\x1b[33mEstablishing secure link to Xubuntu...\x1b[0m\r\n');

            term.onData((data) => {
                let payload = data;
                if (isCtrlToggled && data.length === 1) {
                    const charCode = data.charCodeAt(0);
                    if (charCode >= 97 && charCode <= 122) payload = String.fromCharCode(charCode - 96);
                    toggleCtrl();
                }
                socket.emit('terminal-input', { tabId, data: payload });
            });

            socket.emit('start-session', tabId);
        }

        function switchTab(tabId) {
            if (activeTabId && terminals[activeTabId]) {
                terminals[activeTabId].btn.classList.remove('active');
                terminals[activeTabId].container.classList.remove('active');
            }
            activeTabId = tabId;
            terminals[tabId].btn.classList.add('active');
            terminals[tabId].container.classList.add('active');

            // Switch karne par bhi ek baar fit kardo
            setTimeout(() => { if (terminals[tabId].fit) terminals[tabId].fit.fit(); }, 50);
        }

        function closeTab(tabId, event) {
            event.stopPropagation(); socket.emit('close-session', tabId);
            if (terminals[tabId]) { terminals[tabId].btn.remove(); terminals[tabId].container.remove(); try { terminals[tabId].xterm.dispose(); } catch (e) { } delete terminals[tabId]; }
            if (activeTabId === tabId) { const remaining = Object.keys(terminals); if (remaining.length > 0) switchTab(remaining[0]); else activeTabId = null; }
        }

        // Window resize par saare active terminals auto fit honge!
        window.addEventListener('resize', () => {
            if (activeTabId && terminals[activeTabId]) {
                terminals[activeTabId].fit.fit();
            }
        });

        // --- FULLSCREEN MAGIC ---
        function toggleFullScreen() {
            const wrapper = document.getElementById('terminalWrapper');

            if (!document.fullscreenElement) {
                // Agar phone support karta hai toh native Fullscreen api use karo
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen().catch(err => console.log(err));
                } else if (wrapper.webkitRequestFullscreen) { /* Safari */
                    wrapper.webkitRequestFullscreen();
                }
                wrapper.classList.add('fullscreen-active');
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                }
                wrapper.classList.remove('fullscreen-active');
            }

            // Layout change hone ke baad fit zaruri hai
            setTimeout(() => {
                if (activeTabId && terminals[activeTabId]) terminals[activeTabId].fit.fit();
            }, 200);
        }

        // Fullscreen state listener taaki agar user ESC dabaye ya back kare toh class hat jaye
        // Fullscreen state listener taaki agar user ESC dabaye ya back kare toh class hat jaye
        document.addEventListener('fullscreenchange', () => {
            const wrapper = document.getElementById('terminalWrapper');
            if (!document.fullscreenElement) {
                wrapper.classList.remove('fullscreen-active');
                wrapper.style.height = ''; // ✨ Keyboard fix reset
                setTimeout(() => { if (activeTabId && terminals[activeTabId]) terminals[activeTabId].fit.fit(); }, 200);
            }
        });

        // --- ✨ NATIVE KEYBOARD OVERLAP FIX (Visual Viewport API) ---
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", () => {
                const wrapper = document.getElementById('terminalWrapper');

                // Sirf tab trigger hoga jab hum fullscreen me honge
                if (wrapper.classList.contains('fullscreen-active')) {
                    // Keyboard aane par jitni visible screen bachi hai, wrapper ko exact wahi height de do!
                    wrapper.style.height = window.visualViewport.height + 'px';

                    // Xterm ko naye size ke hisaab se fit kar do taaki text na kate
                    setTimeout(() => {
                        if (activeTabId && terminals[activeTabId]) terminals[activeTabId].fit.fit();
                    }, 50);
                }
            });
        }

        function toggleCtrl() { isCtrlToggled = !isCtrlToggled; document.getElementById('vk-ctrl').classList.toggle('toggled'); }
        function sendDirectKey(k) { if (activeTabId) socket.emit('terminal-input', { tabId: activeTabId, data: k }); }
        function forceKillCurrent() { if (activeTabId && confirm('Force kill this session?')) { socket.emit('force-kill', activeTabId); setTimeout(() => { closeTab(activeTabId, { stopPropagation: () => { } }); }, 300); } }

    </script>
